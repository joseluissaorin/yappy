name: Release builds

# Multi-platform release builds for Yappy.
#
# Triggers:
#   - push of a `v*.*.*` tag → cuts a draft GitHub Release + uploads all four
#     platform bundles to it
#   - workflow_dispatch → uploads bundles as workflow-run artifacts only
#
# We deliberately split "create release" from "build" so the matrix jobs can
# upload via gh CLI (which handles per-file naming) instead of tauri-action's
# release-upload step. On Linux, Tauri 2 emits BOTH `Yappy_*.deb` and
# `yappy_*.deb` (case-sensitive fs + productName Yappy + identifier-derived
# name), which broke tauri-action's filter.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # On a tag push, ensure the draft release exists before the matrix runs.
  # If it already exists, this is a no-op.
  # ────────────────────────────────────────────────────────────────────────
  create-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create or reuse draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists; build jobs will upload to it."
          else
            gh release create "${{ github.ref_name }}" \
              --title "Yappy ${{ github.ref_name }}" \
              --draft \
              --notes "Auto-generated draft. Maintainer adds release notes before publishing."
          fi

  build:
    needs: create-release
    # Allow workflow_dispatch to run too (without needing create-release).
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14         # Apple Silicon runner
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-13         # Intel runner
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Linux deps (webkit2gtk, libsoup, alsa, …)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libasound2-dev    # cpal/alsa-sys needs this for audio output

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: yappy-app/src-tauri -> target

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: yappy-app/package-lock.json

      - name: Install npm deps
        working-directory: yappy-app
        run: npm ci

      # tauri-action JUST BUILDS — we handle uploads ourselves below.
      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: yappy-app
          args: --target ${{ matrix.target }}

      # ──────────────────────────────────────────────────────────────────
      # Upload bundles to the draft release (tag push) OR to workflow
      # artifacts (manual dispatch). We pick one canonical file per format
      # so we skip the Yappy/yappy duplicates Tauri emits on Linux.
      # ──────────────────────────────────────────────────────────────────

      - name: Collect bundle paths (unix)
        if: matrix.platform != 'windows-latest'
        # GH Actions' default `shell: bash` injects `-e -o pipefail` even when
        # the script doesn't ask for it. Override completely so non-zero return
        # codes from intentional `[ -z ]` short-circuits don't kill the script.
        shell: 'bash {0}'
        run: |
          BUNDLE_DIR="${GITHUB_WORKSPACE}/target/${{ matrix.target }}/release/bundle"
          OUT="${GITHUB_WORKSPACE}/_release_uploads"
          mkdir -p "$OUT"
          echo "Looking under: $BUNDLE_DIR"
          ls -la "$BUNDLE_DIR" 2>&1 || true

          # macOS: .dmg
          if [ -d "$BUNDLE_DIR/dmg" ]; then
            find "$BUNDLE_DIR/dmg" -type f -name "*.dmg" -print0 | while IFS= read -r -d '' f; do
              echo "  copy $(basename "$f")"
              cp "$f" "$OUT/"
            done
          fi

          # Linux: .deb, .AppImage, .rpm — prefer "Yappy_*" (capitalized) over the
          # lowercase "yappy_*" duplicate Tauri produces on case-sensitive fs.
          for kind in deb AppImage rpm; do
            files=$( { find "$BUNDLE_DIR" -type f -name "Yappy_*.${kind}" 2>/dev/null;
                       find "$BUNDLE_DIR" -type f -name "Yappy-*.${kind}" 2>/dev/null; } )
            if [ -z "$files" ]; then
              files=$( { find "$BUNDLE_DIR" -type f -name "yappy_*.${kind}" 2>/dev/null;
                         find "$BUNDLE_DIR" -type f -name "yappy-*.${kind}" 2>/dev/null; } )
            fi
            for f in $files; do
              if [ -f "$f" ]; then
                echo "  copy $(basename "$f")"
                cp "$f" "$OUT/"
              fi
            done
          done

          echo
          echo "Collected:"
          ls -lh "$OUT" 2>&1 || true
          # Always exit clean — even an empty dir is fine; upload step is a no-op.
          true

      - name: Collect bundle paths (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $BundleDir = Join-Path $env:GITHUB_WORKSPACE "target\${{ matrix.target }}\release\bundle"
          $Out      = Join-Path $env:GITHUB_WORKSPACE "_release_uploads"
          New-Item -ItemType Directory -Force -Path $Out | Out-Null
          Write-Host "Looking under: $BundleDir"
          if (-not (Test-Path $BundleDir)) {
            Write-Error "Bundle dir not found: $BundleDir"
            exit 1
          }
          Get-ChildItem -Path $BundleDir -Recurse -Include *.msi, *.exe -File `
            | Where-Object { $_.Name -notlike "*.zip*" -and $_.Name -notlike "*.sig" } `
            | ForEach-Object {
                Write-Host "  copy $($_.Name)"
                Copy-Item $_.FullName $Out
              }
          Get-ChildItem $Out

      - name: Upload to release (tag push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: 'bash {0}'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUT="${GITHUB_WORKSPACE}/_release_uploads"
          if [ ! -d "$OUT" ] || [ -z "$(ls -A "$OUT" 2>/dev/null)" ]; then
            echo "Nothing to upload from $OUT — skipping."
            exit 0
          fi
          for f in "$OUT"/*; do
            echo "→ uploading $(basename "$f")"
            gh release upload "${{ github.ref_name }}" "$f" --clobber || echo "  WARN: upload failed for $(basename "$f")"
          done

      - name: Upload as workflow artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: yappy-${{ matrix.label }}
          path: _release_uploads/*
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────
  # Once every matrix job has succeeded, flip the draft release public.
  # Marked as pre-release so we don't claim general availability on the
  # earliest tags; toggle to non-prerelease manually for v1.0.0+.
  # ────────────────────────────────────────────────────────────────────────
  publish-release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft as pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --prerelease=true
          echo "✓ Release ${{ github.ref_name }} is now public."
