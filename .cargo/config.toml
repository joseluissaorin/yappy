# Per-target environment variables.
#
# iOS builds need ORT_LIB_LOCATION pointing at the vendored ONNX Runtime
# static archive (run `scripts/fetch-ort-ios.sh` once to populate). Stable
# cargo only accepts a plain string here, so the path is relative to the
# crate being built. Every Rust workspace member that calls cargo for iOS
# is at most 2 dirs deep — `yappy-app/src-tauri/` is the deepest — so we
# walk up two levels to reach the workspace root.
#
# If the repo is cloned to an unusual location, export
# `ORT_LIB_LOCATION=/absolute/path/...` in the shell to override.

[target.aarch64-apple-ios.env]
ORT_LIB_LOCATION = "../../vendor/ort-ios/ios-arm64"
ORT_SKIP_DOWNLOAD = "1"

[target.aarch64-apple-ios-sim.env]
ORT_LIB_LOCATION = "../../vendor/ort-ios/ios-arm64_x86_64-simulator"
ORT_SKIP_DOWNLOAD = "1"

[target.x86_64-apple-ios.env]
ORT_LIB_LOCATION = "../../vendor/ort-ios/ios-arm64_x86_64-simulator"
ORT_SKIP_DOWNLOAD = "1"
