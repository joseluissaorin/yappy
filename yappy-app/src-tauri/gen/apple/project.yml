name: yappy-app
options:
  bundleIdPrefix: com.yappy.app
  deploymentTarget:
    iOS: 14.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Yappy
      PRODUCT_BUNDLE_IDENTIFIER: com.joseluissaorin.yappy
      # Apple Developer Team ID (Membership → "Team ID"). Required for code
      # signing — Xcode picks the matching Developer ID / Apple Distribution
      # certificate automatically when this is set + Automatically manage
      # signing is on.
      DEVELOPMENT_TEAM: 9LYNY2477X
      # Auto-managed signing for both Debug and Release. For App Store /
      # TestFlight submission this gets a Distribution profile; for local
      # device runs it picks the Development profile.
      CODE_SIGN_STYLE: Automatic
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  yappy-app_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
      - path: yappy-app_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: yappy-app_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
        # Background modes:
        #  - audio: keeps the process alive whenever we're producing audio.
        #    This is the trick we use for "render audiobook" — we begin a
        #    silent audio loop in mobile.rs::begin_background_audio at the
        #    start of a long render, so the Rust synthesis loop keeps
        #    running for the full duration even after the phone locks or
        #    the user switches apps. Audiobook renders can take HOURS.
        #  - processing: lets us schedule BGProcessingTask wake-ups for
        #    interrupted renders so they resume next time the system
        #    grants foreground time.
        UIBackgroundModes:
          - audio
          - processing
        # ActivityKit Live Activities — Lock Screen / Dynamic Island UI for
        # an in-progress audiobook render. Without this key, ActivityKit
        # silently refuses to start activities.
        NSSupportsLiveActivities: true
        # Register `yappy://` URL scheme so the Share Extension can re-open
        # the main app immediately after queuing a payload. Without this,
        # the user has to manually relaunch Yappy to hear the shared item.
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.yappy.app
            CFBundleURLSchemes:
              - yappy
        # User-facing display name (separate from CFBundleName).
        CFBundleDisplayName: Yappy
        # Required reason API declarations — Apple needs these for file
        # timestamp access, hashing, etc. that ORT / pdf parsing touch.
        NSPrivacyAccessedAPITypes:
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategoryFileTimestamp
            NSPrivacyAccessedAPITypeReasons: ["C617.1"] # Inside the app's container
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategorySystemBootTime
            NSPrivacyAccessedAPITypeReasons: ["35F9.1"] # Measure elapsed time
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategoryDiskSpace
            NSPrivacyAccessedAPITypeReasons: ["E174.1"] # Write to app's container
          - NSPrivacyAccessedAPIType: NSPrivacyAccessedAPICategoryUserDefaults
            NSPrivacyAccessedAPITypeReasons: ["CA92.1"] # In-process app settings
    entitlements:
      path: yappy-app_iOS/yappy-app_iOS.entitlements
      properties:
        # App Group container shared with the Share Sheet extension. Must be
        # enabled in the Apple Developer portal under Identifiers → App IDs →
        # com.joseluissaorin.yappy → Capabilities → App Groups, with the group ID
        # `group.com.joseluissaorin.yappy` registered under Identifiers → App Groups.
        com.apple.security.application-groups:
          - group.com.joseluissaorin.yappy
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      # YappyWidgets Live Activity extension — embedded as an app extension.
      - target: YappyWidgets
        embed: true
        codeSign: true
      # YappyShareExtension — receives URLs/text from other apps via Share Sheet.
      - target: YappyShareExtension
        embed: true
        codeSign: true
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
      # CoreML for ORT Neural Engine routing.
      - sdk: CoreML.framework
      # AVFoundation for AudioSession.swift's background keepalive — see
      # comments inside that file. Without this the silent audio trick can't
      # configure AVAudioSession.
      - sdk: AVFoundation.framework
      # ActivityKit for Live Activities (renders progress on Lock Screen /
      # Dynamic Island). Used by future widget extension; main app just
      # imports for the ActivityAttributes type definition.
      - sdk: ActivityKit.framework
    preBuildScripts:
      # ONNX Runtime iOS static-archive selection. The vendored XCFramework
      # ships separate slices for device (iphoneos → ios-arm64) and simulator
      # (iphonesimulator → ios-arm64_x86_64-simulator); both contain a thin
      # arm64 libonnxruntime.a after scripts/fetch-ort-ios.sh runs. Picking
      # via $PLATFORM_NAME is bulletproof — Xcode sets it correctly for the
      # SDK actually being built against.
      - script: |
          set -e
          VENDOR="$SRCROOT/../../../../vendor/ort-ios"
          if [ "$PLATFORM_NAME" = "iphoneos" ]; then
            export ORT_LIB_LOCATION="$VENDOR/ios-arm64"
          else
            export ORT_LIB_LOCATION="$VENDOR/ios-arm64_x86_64-simulator"
          fi
          export ORT_SKIP_DOWNLOAD=1
          echo "→ ORT_LIB_LOCATION=$ORT_LIB_LOCATION"
          cargo tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a

  # ─── Live Activity Widget Extension ───────────────────────────────────
  # Renders the audiobook render progress on the Lock Screen and Dynamic
  # Island. Embedded into the main app bundle as PlugIns/YappyWidgets.appex.
  # Sources are in `YappyWidgets/`; shares the RenderActivityAttributes
  # struct with the main app via Sources/yappy-app/.
  YappyWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: YappyWidgets
      - path: Sources/yappy-app/RenderActivityAttributes.swift
    info:
      path: YappyWidgets/Info.plist
      properties:
        CFBundleDisplayName: YappyWidgets
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: YappyWidgets/YappyWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.joseluissaorin.yappy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joseluissaorin.yappy.YappyWidgets
        PRODUCT_NAME: YappyWidgets
        DEVELOPMENT_TEAM: 9LYNY2477X
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "16.1"
        SWIFT_VERSION: "5.0"
        SKIP_INSTALL: YES
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: false
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: ActivityKit.framework

  # ─── Share Sheet Extension ────────────────────────────────────────────
  # Accepts URLs and text from "Share to → Yappy" in any iOS app, writes
  # the payload into the App Group container, and the main app reads it
  # on next launch via mobile::pickup_shared_payload.
  YappyShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: YappyShareExtension
    info:
      path: YappyShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Yappy
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
    entitlements:
      path: YappyShareExtension/YappyShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.joseluissaorin.yappy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joseluissaorin.yappy.ShareExtension
        PRODUCT_NAME: YappyShare
        DEVELOPMENT_TEAM: 9LYNY2477X
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.0"
        SKIP_INSTALL: YES
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: false
    dependencies:
      - sdk: UIKit.framework
      - sdk: MobileCoreServices.framework
      - sdk: UniformTypeIdentifiers.framework